<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Marcas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Catálogo de Marcas</h1>

    <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>

    <div class="row mb-4">
        <div class="col-md-6">
            <form th:action="@{/marcas/buscar}" method="get" class="d-flex">
                <input type="text" name="nombre" class="form-control me-2"
                       placeholder="Buscar por nombre..." th:value="${nombreBusqueda}">
                <button class="btn btn-outline-primary" type="submit">Buscar</button>
            </form>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/marcas/nuevo}" class="btn btn-primary">Nueva Marca</a>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${marcas.empty}">
            <td colspan="4" class="text-center">No hay marcas disponibles</td>
        </tr>
        <tr th:each="marca : ${marcas}">
            <td th:text="${marca.id}"></td>
            <td th:text="${marca.nombre}"></td>
            <td th:text="${'$' + marca.precio}"></td>
            <td>
                <a th:href="@{/marcas/editar/{id}(id=${marca.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/marcas/eliminar/{id}(id=${marca.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('¿Estás seguro de eliminar esta marca?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
